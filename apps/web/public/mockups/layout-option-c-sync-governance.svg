<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">方案 C：同步治理管线</title>
  <desc id="desc">股票数据库管理系统桌面后台同步治理布局方案，突出数据源能力、任务管线、数据质量和数据湖分层。</desc>
  <defs>
    <style>
      .bg { fill: #f3f6fa; }
      .dark { fill: #102033; }
      .card { fill: #ffffff; stroke: #dfe8f4; stroke-width: 1; }
      .panel { fill: #f8fbff; stroke: #e2ebf6; stroke-width: 1; }
      .ink { fill: #172033; font-family: "Microsoft YaHei", "Noto Sans SC", "Segoe UI", sans-serif; }
      .muted { fill: #667085; font-family: "Microsoft YaHei", "Noto Sans SC", "Segoe UI", sans-serif; }
      .white { fill: #ffffff; font-family: "Microsoft YaHei", "Noto Sans SC", "Segoe UI", sans-serif; }
      .label { font-size: 18px; font-weight: 800; }
      .small { font-size: 13px; }
      .tiny { font-size: 11px; }
      .tag { font-size: 12px; font-weight: 800; }
      .green { fill: #eaf8f0; stroke: #bfe8cf; }
      .blue { fill: #e8f2ff; stroke: #b8d8ff; }
      .amber { fill: #fff7e6; stroke: #ffe0a3; }
      .red { fill: #fff0f0; stroke: #ffc4c4; }
      .line { stroke: #d7e1ee; stroke-width: 1; }
      .pipe { stroke: #1f6feb; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .pipe2 { stroke: #1f8f59; stroke-width: 3; fill: none; marker-end: url(#arrowGreen); }
      .dash { stroke: #98a2b3; stroke-width: 2; stroke-dasharray: 7 7; fill: none; marker-end: url(#arrowGray); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1f6feb"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1f8f59"/>
    </marker>
    <marker id="arrowGray" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#98a2b3"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#122033" flood-opacity=".08"/>
    </filter>
  </defs>

  <rect class="bg" width="1600" height="1000"/>
  <rect class="dark" x="0" y="0" width="1600" height="72"/>
  <rect x="28" y="20" width="36" height="36" rx="8" fill="#2b7fff"/>
  <text class="white" x="46" y="44" text-anchor="middle" font-size="18" font-weight="800">Q</text>
  <text class="white" x="84" y="30" font-size="13">Quant 数据工作台 / 方案 C</text>
  <text class="white" x="84" y="55" font-size="24" font-weight="800">同步治理管线</text>
  <text class="white" x="1240" y="44" font-size="13">数据源能力声明 / source=auto / 质量回溯</text>

  <g filter="url(#shadow)">
    <rect class="card" x="44" y="102" width="334" height="556" rx="8"/>
    <rect class="card" x="406" y="102" width="762" height="556" rx="8"/>
    <rect class="card" x="1196" y="102" width="360" height="556" rx="8"/>
    <rect class="card" x="44" y="690" width="1512" height="248" rx="8"/>
  </g>

  <text class="ink label" x="72" y="140">数据源控制面板</text>
  <text class="muted small" x="72" y="164">只暴露第一版来源：AKShare / BaoStock / AData / Tushare / Stock SDK</text>
  <g transform="translate(72 198)">
    <rect class="blue" width="278" height="118" rx="10"/>
    <text class="ink" x="20" y="32" font-size="18" font-weight="800">AKShare</text>
    <text class="muted small" x="20" y="58">启用 / 优先级 1 / Python 包</text>
    <rect x="20" y="76" width="76" height="24" rx="12" fill="#ffffff" stroke="#b8d8ff"/><text x="58" y="93" text-anchor="middle" fill="#1456b8" font-size="12" font-weight="800">股票列表</text>
    <rect x="104" y="76" width="78" height="24" rx="12" fill="#ffffff" stroke="#b8d8ff"/><text x="143" y="93" text-anchor="middle" fill="#1456b8" font-size="12" font-weight="800">日线行情</text>
    <rect class="green" y="144" width="278" height="118" rx="10"/>
    <text class="ink" x="20" y="176" font-size="18" font-weight="800">BaoStock</text>
    <text class="muted small" x="20" y="202">启用 / 优先级 2 / 真实取样 8,772</text>
    <rect x="20" y="220" width="76" height="24" rx="12" fill="#ffffff" stroke="#bfe8cf"/><text x="58" y="237" text-anchor="middle" fill="#1f8f59" font-size="12" font-weight="800">股票列表</text>
    <rect x="104" y="220" width="78" height="24" rx="12" fill="#ffffff" stroke="#bfe8cf"/><text x="143" y="237" text-anchor="middle" fill="#1f8f59" font-size="12" font-weight="800">日线行情</text>
    <rect x="190" y="220" width="72" height="24" rx="12" fill="#ffffff" stroke="#bfe8cf"/><text x="226" y="237" text-anchor="middle" fill="#1f8f59" font-size="12" font-weight="800">交易日历</text>
    <rect class="amber" y="288" width="278" height="118" rx="10"/>
    <text class="ink" x="20" y="320" font-size="18" font-weight="800">Tushare</text>
    <text class="muted small" x="20" y="346">可选增强 / 需要 Token</text>
    <rect x="20" y="364" width="118" height="24" rx="12" fill="#ffffff" stroke="#ffe0a3"/><text x="79" y="381" text-anchor="middle" fill="#ad6800" font-size="12" font-weight="800">TUSHARE_TOKEN</text>
  </g>

  <text class="ink label" x="434" y="140">同步管线泳道</text>
  <text class="muted small" x="434" y="164">任务创建后由任务执行器处理，API 不直接跑长任务</text>

  <g transform="translate(434 206)">
    <rect class="panel" x="0" y="0" width="164" height="86" rx="10"/>
    <text class="ink" x="82" y="34" text-anchor="middle" font-size="15" font-weight="800">source=auto</text>
    <text class="muted tiny" x="82" y="56" text-anchor="middle">按启用/能力/优先级</text>
    <path class="pipe" d="M168 43 L242 43"/>
    <rect class="panel" x="250" y="0" width="164" height="86" rx="10"/>
    <text class="ink" x="332" y="34" text-anchor="middle" font-size="15" font-weight="800">任务队列</text>
    <text class="muted tiny" x="332" y="56" text-anchor="middle">等待中 / 运行中</text>
    <path class="pipe" d="M418 43 L492 43"/>
    <rect class="panel" x="500" y="0" width="190" height="86" rx="10"/>
    <text class="ink" x="595" y="34" text-anchor="middle" font-size="15" font-weight="800">标准化 normalize</text>
    <text class="muted tiny" x="595" y="56" text-anchor="middle">统一字段与来源</text>
    <path class="pipe2" d="M595 90 L595 150"/>

    <rect class="green" x="0" y="168" width="194" height="92" rx="10"/>
    <text class="ink" x="97" y="202" text-anchor="middle" font-size="15" font-weight="800">股票库</text>
    <text class="muted tiny" x="97" y="224" text-anchor="middle">PostgreSQL 元数据</text>
    <rect class="green" x="256" y="168" width="194" height="92" rx="10"/>
    <text class="ink" x="353" y="202" text-anchor="middle" font-size="15" font-weight="800">交易日历</text>
    <text class="muted tiny" x="353" y="224" text-anchor="middle">开市日 / 休市日</text>
    <rect class="green" x="512" y="168" width="194" height="92" rx="10"/>
    <text class="ink" x="609" y="202" text-anchor="middle" font-size="15" font-weight="800">日线行情</text>
    <text class="muted tiny" x="609" y="224" text-anchor="middle">Parquet Silver</text>

    <path class="dash" d="M97 264 C97 310 230 310 230 352"/>
    <path class="dash" d="M353 264 C353 310 330 310 330 352"/>
    <path class="dash" d="M609 264 C609 310 430 310 430 352"/>
    <rect class="panel" x="186" y="360" width="360" height="94" rx="10"/>
    <text class="ink" x="366" y="394" text-anchor="middle" font-size="15" font-weight="800">生成数据集目录与质量报告</text>
    <text class="muted tiny" x="366" y="418" text-anchor="middle">row_count / schema / quality_status / source</text>

    <path class="pipe2" d="M550 407 L658 407"/>
    <rect x="672" y="376" width="58" height="58" rx="12" fill="#172033"/>
    <text class="white" x="701" y="411" text-anchor="middle" font-size="13" font-weight="800">API</text>
  </g>

  <text class="ink label" x="1224" y="140">质量与任务日志</text>
  <text class="muted small" x="1224" y="164">排查缺失、重复、OHLC 边界、任务失败</text>
  <g transform="translate(1224 198)">
    <rect class="red" width="276" height="82" rx="10"/>
    <text class="ink" x="18" y="30" font-size="14" font-weight="800">缺失交易日</text>
    <text class="muted small" x="18" y="54">日线行情 / 000001 / 1 天</text>
    <rect class="amber" y="102" width="276" height="82" rx="10"/>
    <text class="ink" x="18" y="132" font-size="14" font-weight="800">真实取样失败</text>
    <text class="muted small" x="18" y="156">Tushare / Token 未配置</text>
    <rect class="green" y="204" width="276" height="82" rx="10"/>
    <text class="ink" x="18" y="234" font-size="14" font-weight="800">写入成功</text>
    <text class="muted small" x="18" y="258">股票库 / AKShare / 5,362 条</text>
    <line class="line" x1="0" y1="318" x2="276" y2="318"/>
    <text class="ink" x="0" y="356" font-size="15" font-weight="800">任务日志</text>
    <circle cx="8" cy="386" r="5" fill="#1f6feb"/><text class="ink small" x="26" y="391">尝试 BaoStock 日线行情</text>
    <text class="muted tiny" x="26" y="410">来源降级会记录每次尝试</text>
    <circle cx="8" cy="444" r="5" fill="#1f8f59"/><text class="ink small" x="26" y="449">normalize 完成</text>
    <text class="muted tiny" x="26" y="468">写入来源和入库时间</text>
  </g>

  <text class="ink label" x="72" y="728">数据湖与元数据分层</text>
  <text class="muted small" x="72" y="752">第一阶段主路径实现 Silver，但目录提前按 raw / bronze / silver / gold 规划</text>
  <g transform="translate(72 790)">
    <rect class="panel" width="312" height="92" rx="10"/>
    <text class="ink" x="156" y="34" text-anchor="middle" font-size="18" font-weight="800">raw</text>
    <text class="muted small" x="156" y="58" text-anchor="middle">保留原始响应</text>
    <path class="pipe" d="M320 46 L390 46"/>
    <rect class="panel" x="404" width="312" height="92" rx="10"/>
    <text class="ink" x="560" y="34" text-anchor="middle" font-size="18" font-weight="800">bronze</text>
    <text class="muted small" x="560" y="58" text-anchor="middle">字段初步标准化</text>
    <path class="pipe" d="M724 46 L794 46"/>
    <rect class="green" x="808" width="312" height="92" rx="10"/>
    <text class="ink" x="964" y="34" text-anchor="middle" font-size="18" font-weight="800">silver</text>
    <text class="muted small" x="964" y="58" text-anchor="middle">当前主路径 / 可查询</text>
    <path class="dash" d="M1128 46 L1198 46"/>
    <rect class="panel" x="1212" width="228" height="92" rx="10"/>
    <text class="ink" x="1326" y="34" text-anchor="middle" font-size="18" font-weight="800">gold</text>
    <text class="muted small" x="1326" y="58" text-anchor="middle">后续因子/研究</text>
  </g>
</svg>
