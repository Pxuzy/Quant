  <text class="muted tiny" x="565" y="278" text-anchor="middle">市场 中国 A 股</text>
  <rect x="640" y="262" width="118" height="24" rx="6" fill="#ffffff" stroke="#d8e3f0"/>
  <text class="muted tiny" x="699" y="278" text-anchor="middle">状态 已上市</text>
  <rect x="1038" y="260" width="110" height="28" rx="6" fill="#1f6feb"/>
  <text fill="#ffffff" x="1093" y="279" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="12" font-weight="700">查询</text>

