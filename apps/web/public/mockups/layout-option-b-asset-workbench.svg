  <text class="ink small" x="1440" y="370" text-anchor="end" font-weight="800">2026-06-05</text>
  <text class="muted small" x="1254" y="404">日线记录</text>
  <text class="ink small" x="1440" y="404" text-anchor="end" font-weight="800">4,862</text>
  <text class="muted small" x="1254" y="438">质量状态</text>
  <rect class="pillGreen" x="1390" y="421" width="74" height="24" rx="12"/>
  <text x="1427" y="438" text-anchor="middle" fill="#1f8f59" font-family="Microsoft YaHei, sans-serif" font-size="12" font-weight="800">通过</text>
  <line class="line" x1="1254" y1="468" x2="1530" y2="468"/>

  <text class="ink" x="1254" y="508" font-size="16" font-weight="800">关联任务</text>
  <circle cx="1264" cy="546" r="5" fill="#1f8f59"/><text class="ink small" x="1282" y="551">股票列表同步成功</text><text class="muted tiny" x="1282" y="570">AKShare / 5,362 条</text>
  <line x1="1264" y1="554" x2="1264" y2="602" stroke="#c8d6e8"/>
  <circle cx="1264" cy="614" r="5" fill="#1f6feb"/><text class="ink small" x="1282" y="619">日线行情增量同步</text><text class="muted tiny" x="1282" y="638">BaoStock / 运行中</text>
  <line class="line" x1="1254" y1="672" x2="1530" y2="672"/>

  <text class="ink" x="1254" y="712" font-size="16" font-weight="800">数据源状态</text>
  <rect class="pillGreen" x="1254" y="734" width="84" height="28" rx="14"/><text x="1296" y="753" text-anchor="middle" fill="#1f8f59" font-family="Microsoft YaHei, sans-serif" font-size="12" font-weight="800">AKShare</text>
  <rect class="pillGreen" x="1348" y="734" width="90" height="28" rx="14"/><text x="1393" y="753" text-anchor="middle" fill="#1f8f59" font-family="Microsoft YaHei, sans-serif" font-size="12" font-weight="800">BaoStock</text>
  <rect class="pillAmber" x="1254" y="774" width="84" height="28" rx="14"/><text x="1296" y="793" text-anchor="middle" fill="#ad6800" font-family="Microsoft YaHei, sans-serif" font-size="12" font-weight="800">Tushare</text>
