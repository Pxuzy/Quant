    <text class="ink" x="434" y="466">平安银行</text>
    <text class="muted" x="580" y="466">中国 A 股 / 深交所</text>
    <text class="muted" x="746" y="466">银行</text>
    <text class="ink" x="894" y="466">BaoStock</text>
    <rect class="pillAmber" x="1020" y="448" width="62" height="24" rx="12"/><text x="1051" y="465" text-anchor="middle" fill="#ad6800">警告</text>
    <line class="line" x1="286" y1="487" x2="1176" y2="487"/>
    <text class="ink" x="306" y="522" font-weight="800">300750</text>
    <text class="ink" x="434" y="522">宁德时代</text>
    <text class="muted" x="580" y="522">中国 A 股 / 深交所</text>
    <text class="muted" x="746" y="522">电池</text>
    <text class="ink" x="894" y="522">Tushare</text>
    <rect class="pillGreen" x="1020" y="504" width="62" height="24" rx="12"/><text x="1051" y="521" text-anchor="middle" fill="#1f8f59">通过</text>
    <line class="line" x1="286" y1="543" x2="1176" y2="543"/>
    <text class="ink" x="306" y="578" font-weight="800">601318</text>
    <text class="ink" x="434" y="578">中国平安</text>
    <text class="muted" x="580" y="578">中国 A 股 / 上交所</text>
    <text class="muted" x="746" y="578">保险</text>
    <text class="ink" x="894" y="578">BaoStock</text>
    <rect class="pillGreen" x="1020" y="560" width="62" height="24" rx="12"/><text x="1051" y="577" text-anchor="middle" fill="#1f8f59">通过</text>
  </g>

  <rect class="soft" x="286" y="640" width="890" height="258" rx="8"/>
  <text class="ink label" x="312" y="676">选中资产的日线预览</text>
  <text class="muted small" x="312" y="699">切换主表行时刷新，不把 Parquet/DuckDB 路径暴露给前端</text>
  <g transform="translate(326 728)">
    <line class="line" x1="0" y1="40" x2="810" y2="40"/>
    <line class="line" x1="0" y1="92" x2="810" y2="92"/>
    <line class="line" x1="0" y1="144" x2="810" y2="144"/>
    <path class="area" d="M0 135 L60 118 L120 126 L180 105 L240 95 L300 104 L360 76 L420 66 L480 73 L540 52 L600 58 L660 38 L720 46 L810 28 L810 170 L0 170 Z"/>
    <path class="chart" d="M0 135 L60 118 L120 126 L180 105 L240 95 L300 104 L360 76 L420 66 L480 73 L540 52 L600 58 L660 38 L720 46 L810 28"/>
  </g>

  <text class="ink label" x="1254" y="140">右侧详情检查器</text>
  <text class="muted small" x="1254" y="164">字段、来源、质量、任务链路</text>
  <rect class="pillBlue" x="1254" y="190" width="122" height="30" rx="15"/>
  <text class="blueText tag" x="1315" y="210" text-anchor="middle">600519</text>
  <text class="ink" x="1254" y="250" font-size="24" font-weight="800">贵州茅台</text>
  <text class="muted small" x="1254" y="276">中国 A 股 / 上交所 / 白酒</text>
  <line class="line" x1="1254" y1="304" x2="1530" y2="304"/>
