<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">方案 B：数据资产工作台</title>
  <desc id="desc">股票数据库管理系统桌面后台数据资产工作台布局方案，采用主表和右侧检查器，适合高频查询和单条记录溯源。</desc>
  <defs>
    <style>
      .bg { fill: #f6f8fb; }
      .sider { fill: #ffffff; stroke: #dfe8f4; }
      .card { fill: #ffffff; stroke: #dfe8f4; stroke-width: 1; }
      .soft { fill: #f8fbff; stroke: #e5edf7; }
      .navActive { fill: #edf5ff; stroke: #bcd8ff; }
      .ink { fill: #172033; font-family: "Microsoft YaHei", "Noto Sans SC", "Segoe UI", sans-serif; }
      .muted { fill: #667085; font-family: "Microsoft YaHei", "Noto Sans SC", "Segoe UI", sans-serif; }
      .blueText { fill: #1456b8; font-family: "Microsoft YaHei", "Noto Sans SC", "Segoe UI", sans-serif; }
      .label { font-size: 18px; font-weight: 800; }
      .small { font-size: 13px; }
      .tiny { font-size: 11px; }
      .tag { font-size: 12px; font-weight: 700; }
      .line { stroke: #dce6f2; stroke-width: 1; }
      .pillBlue { fill: #e8f2ff; stroke: #b8d8ff; }
      .pillGreen { fill: #eaf8f0; stroke: #bfe8cf; }
      .pillAmber { fill: #fff7e6; stroke: #ffe0a3; }
      .area { fill: url(#area); }
      .chart { fill: none; stroke: #1f6feb; stroke-width: 3; stroke-linejoin: round; stroke-linecap: round; }
    </style>
    <linearGradient id="area" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#1f6feb" stop-opacity=".22"/>
      <stop offset="100%" stop-color="#1f6feb" stop-opacity=".03"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#122033" flood-opacity=".07"/>
    </filter>
  </defs>

  <rect class="bg" width="1600" height="1000"/>
  <rect class="sider" x="0" y="0" width="232" height="1000"/>
  <rect x="24" y="24" width="40" height="40" rx="8" fill="#172033"/>
  <text x="44" y="50" text-anchor="middle" fill="#ffffff" font-family="Segoe UI, sans-serif" font-size="20" font-weight="800">Q</text>
  <text class="ink" x="78" y="42" font-size="18" font-weight="800">Quant</text>
  <text class="muted" x="78" y="61" font-size="12">数据系统</text>
  <text class="muted" x="28" y="118" font-size="12">数据系统</text>
  <rect class="navActive" x="18" y="138" width="196" height="42" rx="7"/>
  <text class="blueText" x="48" y="164" font-size="14" font-weight="800">数据资产工作台</text>
  <text class="muted" x="48" y="218" font-size="14">股票库</text>
  <text class="muted" x="48" y="266" font-size="14">日线行情</text>
  <text class="muted" x="48" y="314" font-size="14">交易日历</text>
  <text class="muted" x="48" y="362" font-size="14">数据集目录</text>
  <text class="muted" x="48" y="410" font-size="14">数据源</text>
  <text class="muted" x="48" y="458" font-size="14">同步任务</text>
  <text class="muted" x="48" y="506" font-size="14">数据质量</text>

  <rect x="232" y="0" width="1368" height="72" fill="#ffffff" stroke="#e4ebf5"/>
  <text class="muted" x="268" y="28" font-size="12">Quant 数据工作台 / 方案 B</text>
  <text class="ink" x="268" y="55" font-size="23" font-weight="800">数据资产工作台</text>
  <text class="muted" x="1268" y="44" font-size="13">只通过 API 查询，服务端分页</text>

  <g filter="url(#shadow)">
    <rect class="card" x="260" y="102" width="944" height="836" rx="8"/>
    <rect class="card" x="1228" y="102" width="328" height="836" rx="8"/>
  </g>

  <text class="ink label" x="286" y="140">主数据表</text>
  <text class="muted small" x="286" y="164">股票库、日线行情、交易日历、数据集目录统一在主工作区切换</text>
