<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">方案 D：个人股票工作台</title>
  <desc id="desc">股票数据管理与研究工作台布局方案，融合工作台层、控制面和接口面，突出股票池、新闻、数值和数据治理。</desc>
  <defs>
    <style>
      .bg { fill: #f3f6fa; }
      .sider { fill: #0f1b2d; }
      .header { fill: #ffffff; }
      .card { fill: #ffffff; stroke: #dce6f2; stroke-width: 1; }
      .soft { fill: #f8fbff; stroke: #e5edf7; stroke-width: 1; }
      .ink { fill: #172033; font-family: "Microsoft YaHei", "Noto Sans SC", "Segoe UI", sans-serif; }
      .muted { fill: #667085; font-family: "Microsoft YaHei", "Noto Sans SC", "Segoe UI", sans-serif; }
      .white { fill: #ffffff; font-family: "Microsoft YaHei", "Noto Sans SC", "Segoe UI", sans-serif; }
      .blue { fill: #e8f2ff; stroke: #b8d8ff; }
      .green { fill: #eaf8f0; stroke: #bfe8cf; }
      .amber { fill: #fff7e6; stroke: #ffe0a3; }
      .red { fill: #fff0f0; stroke: #ffc4c4; }
      .chip { font-size: 12px; font-weight: 800; }
      .label { font-size: 18px; font-weight: 800; }
      .small { font-size: 13px; }
      .tiny { font-size: 11px; }
      .num { font-size: 24px; font-weight: 800; }
      .nav { fill: #cbd5e1; font-size: 14px; }
      .navActiveBg { fill: #1f6feb; }
      .line { stroke: #d7e1ee; stroke-width: 1; }
      .axis { stroke: #d9e4f1; stroke-width: 1; }
      .up { stroke: #1f6feb; fill: none; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .area { fill: rgba(31, 111, 235, 0.12); }
      .tagGreen { fill: #eaf8f0; }
      .tagAmber { fill: #fff7e6; }
      .tagGray { fill: #eef2f6; }
    </style>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1f6feb"/>
    </marker>
    <marker id="arrowGray" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#98a2b3"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
