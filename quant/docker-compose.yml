services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: quant-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: quant
      POSTGRES_PASSWORD: quant
      POSTGRES_DB: quant
    ports:
      - "5432:5432"
    volumes:
      - quant-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quant -d quant"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  quant-postgres-data:
